// ─────────────────────────────────────────────
// QUIZ GENERATOR — choice + spelling mixed
// ─────────────────────────────────────────────
function generateQuiz(words) {
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  const pool = shuffled.slice(0, Math.min(6, shuffled.length));
  return pool.map((word, i) => {
    // alternate: even = multiple choice, odd = spell it
    const type = i % 2 === 0 ? "choice" : "spell";
    if (type === "choice") {
      const others = words.filter(w => w.en !== word.en).sort(() => Math.random() - 0.5).slice(0, 3);
      const options = [word.en, ...others.map(w => w.en)].sort(() => Math.random() - 0.5);
      return {
        type: "choice",
        emoji: word.emoji,
        question: `${word.emoji}  ${word.zh}`,
        options,
        answer: word.en
      };
    } else {
      return {
        type: "spell",
        emoji: word.emoji,
        question: `${word.emoji}  ${word.zh}`,
        answer: word.en
      };
    }
  });
}
