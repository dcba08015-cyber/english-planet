// QUIZ GENERATOR — choice + spelling mixed
// ─────────────────────────────────────────────
function generateQuiz(words) {
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  const pool = shuffled.slice(0, Math.min(6, shuffled.length));
  return pool.map((word, i) => {
    // alternate: even = multiple choice, odd = spell it
    const type = i % 2 === 0 ? "choice" : "spell";
    if (type === "choice") {
      const others = words.filter(w => w.en !== word.en).sort(() => Math.random() - 0.5).slice(0, 3);
      const options = [word.en, ...others.map(w => w.en)].sort(() => Math.random() - 0.5);
      return {
        type: "choice",
        emoji: word.emoji,
        question: `${word.emoji}  ${word.zh}`,
        options,
        answer: word.en
      };
    } else {
      return {
        type: "spell",
        emoji: word.emoji,
        question: `${word.emoji}  ${word.zh}`,
        answer: word.en
      };
    }
  });
}

// TTS + STORAGE
// ─────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
const SKEY = "english_planet_v3";
function loadData() {
  try {
    const r = localStorage.getItem(SKEY);
    return r ? JSON.parse(r) : defaultData();
  } catch {
    return defaultData();
  }
}
function defaultData() {
  return {
    stars: 0,
    streak: 0,
    lastDate: null,
    pin: "1234",
    progress: {},
    scores: {}
  };
}
function saveData(d) {
  try {
    localStorage.setItem(SKEY, JSON.stringify(d));
  } catch {}
}

const KUROMI_IMGS = {

// Animated CSS keyframes injected once
const ANIM_CSS = `
@keyframes kuromiPop{0%,100%{transform:scale(1) rotate(0deg)}40%{transform:scale(1.18) rotate(-6deg)}70%{transform:scale(0.95) rotate(4deg)}}
@keyframes kuromiBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes kuromiShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes starFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-40px) scale(1.5);opacity:0}}
@keyframes skullPulse{0%,100%{opacity:0.04}50%{opacity:0.07}}
@keyframes thumbUp{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-8px) rotate(-10deg)}60%{transform:translateY(-4px) rotate(5deg)}}
`;

let cssInjected = false;
function injectCSS() {
  if (cssInjected) return;
  const style = document.createElement("style");
  style.textContent = ANIM_CSS;
  document.head.appendChild(style);
  cssInjected = true;
}

// Kuromi display with mood
function KuromiMood({ size=80, mood="normal", glow="rgba(168,85,247,0.5)" }) {
  useEffect(() => { injectCSS(); }, []);
  const moodStyle = {
    normal:  { animation:"kuromiBounce 2s ease-in-out infinite" },
    happy:   { animation:"kuromiPop 0.6s ease-in-out infinite" },
    clap:    { animation:"kuromiShake 0.4s ease-in-out infinite" },
    thumbup: { animation:"thumbUp 0.7s ease-in-out infinite" },
    sad:     { animation:"kuromiShake 1.5s ease-in-out infinite", filter:"grayscale(30%)" },
  };
  const moodEmoji = { normal:"", happy:"⭐", clap:"👏", thumbup:"👍", sad:"" };
  return (
    <div style={{ position:"relative", display:"inline-block", textAlign:"center" }}>
      <img
        src={KUROMI_IMGS.normal}
        alt="Kuromi"
        width={size} height={size}
        style={{
          objectFit:"contain",
          filter:`drop-shadow(0 0 10px ${glow})`,
          display:"block",
          ...(moodStyle[mood] || moodStyle.normal),
        }}
        onError={e => { e.target.style.display="none"; }}
      />
      {moodEmoji[mood] && (
        <div style={{
          position:"absolute", top:-8, right:-8,
          fontSize: size/3.5, lineHeight:1,
          animation:"thumbUp 0.7s ease-in-out infinite",
          filter:`drop-shadow(0 0 6px ${glow})`,
        }}>
          {moodEmoji[mood]}
        </div>
      )}
    </div>
  );
}

// Floating stars effect on correct answer
function StarBurst({ count=5 }) {
  useEffect(() => { injectCSS(); }, []);
  return (
    <div style={{ position:"absolute", inset:0, pointerEvents:"none", overflow:"hidden" }}>
      {Array.from({length:count}).map((_,i) => (
        <div key={i} style={{
          position:"absolute",
          left: `${20 + i*15}%`,
          top: `${30 + (i%3)*20}%`,
          fontSize:18,
          animation:`starFloat ${0.8+i*0.2}s ease-out ${i*0.1}s forwards`,
        }}>⭐</div>
      ))}
    </div>
  );
}

// Skull background pattern
function SkullBg() {
  useEffect(() => { injectCSS(); }, []);
  return (

      position:"fixed", inset:0, pointerEvents:"none", zIndex:0,
      backgroundImage:"radial-gradient(circle, rgba(255,107,157,0.06) 1px, transparent 1px)",

  );
}

// ─────────────────────────────────────────────
// QUIZ GENERATOR — choice + spelling mixed
// ─────────────────────────────────────────────
function generateQuiz(words) {
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  const pool = shuffled.slice(0, Math.min(6, shuffled.length));
  return pool.map((word, i) => {
    // alternate: even = multiple choice, odd = spell it
    const type = i % 2 === 0 ? "choice" : "spell";
    if (type === "choice") {
      const others = words.filter(w => w.en !== word.en).sort(() => Math.random() - 0.5).slice(0, 3);
      const options = [word.en, ...others.map(w => w.en)].sort(() => Math.random() - 0.5);
      return { type:"choice", emoji:word.emoji, question:`${word.emoji}  ${word.zh}`, options, answer:word.en };
    } else {
      return { type:"spell", emoji:word.emoji, question:`${word.emoji}  ${word.zh}`, answer:word.en };
    }
  });
}

// ─────────────────────────────────────────────
// TTS + STORAGE
// ─────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

const SKEY = "english_planet_v3";
function loadData() {
  try { const r = localStorage.getItem(SKEY); return r ? JSON.parse(r) : defaultData(); } catch { return defaultData(); }
}
function defaultData() { return { stars:0, streak:0, lastDate:null, pin:"1234", progress:{}, scores:{} }; }
function saveData(d) { try { localStorage.setItem(SKEY, JSON.stringify(d)); } catch {} }

      persist(d => ({ ...d, lastDate:today, streak: d.lastDate===yest.toDateString() ? d.streak+1 : 1 }));
    }
  }, []);
  useEffect(() => { chatBottom.current?.scrollIntoView({behavior:"smooth"}); }, [chat]);

  function persist(fn) { setData(d => { const n=fn(d); saveData(n); return n; }); }
  function getP(id) { return data.progress[id] || {fc:false,chat:false,quiz:null}; }
  function isComplete(id) { const p=getP(id); return p.fc&&p.chat&&p.quiz!==null; }

  }

  function fcDone() {
    persist(d => ({ ...d, stars:d.stars+1, progress:{...d.progress, [unit.id]:{...getP(unit.id),fc:true}} }));
    goUnit(unit);
  }

  // ── CHAT ──
  async function sendChat() {
    if (!chatIn.trim()||chatLoading) return;
    const msg = chatIn.trim(); setChatIn("");
    const msgs = [...chat, {role:"user",content:msg}];
    setChat(msgs); setChatLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:1000,
          system:`${unit.aiPrompt} Always respond in a friendly mix of Chinese and English for Taiwanese elementary students. Be warm, playful like Kuromi, and brief (max 3 sentences). Use emojis. Never be discouraging.`,
          messages:msgs.map(m=>({role:m.role,content:m.content})),
        }),
      });
      const j = await res.json();
      const reply = j.content?.[0]?.text || "再說一次吧！😈";
      setChat(prev=>[...prev,{role:"assistant",content:reply}]);
      persist(d => ({ ...d, stars:d.stars+2, progress:{...d.progress,[unit.id]:{...getP(unit.id),chat:true}} }));
    } catch(e) {
      setChat(prev=>[...prev,{role:"assistant",content:"哎呀庫洛米當機了！再試一次吧 😅"}]);
    }
    setChatLoading(false);
  }

    if (quizAns!==null) return;
    const q = quizQs[quizIdx];
    const correct = opt===q.answer;
    setQuizAns(correct?"correct":"wrong");
    if (correct) setQuizScore(s=>s+1);
    setTimeout(() => nextQ(correct), 1200);
  }
  function handleSpell() {
    if (spellResult!==null) return;
    const q = quizQs[quizIdx];
    const correct = spellInput.trim().toLowerCase()===q.answer.toLowerCase();
    setSpellResult(correct);
    if (correct) setQuizScore(s=>s+1);
    setTimeout(() => { setSpellInput(""); setSpellResult(null); nextQ(correct); }, 1300);
  }
  function nextQ(wasCorrect) {
    const next = quizIdx+1;
    if (next>=quizQs.length) {
      const total = quizQs.length;
      const pct = Math.round(((quizScore+(wasCorrect?1:0))/total)*100);
      persist(d => {
        const prev = d.progress[unit.id]?.quiz || 0;
        return {
          ...d, stars:d.stars+Math.round(pct/20),
          scores:{...d.scores,[unit.id]:[...(d.scores[unit.id]||[]),{score:pct,date:new Date().toLocaleDateString("zh-TW")}]},
          progress:{...d.progress,[unit.id]:{...getP(unit.id),quiz:Math.max(prev,pct)}},
        };
      });
      setQuizDone(true);

      setQuizIdx(next); setQuizAns(null); setSpellInput(""); setSpellResult(null);

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>

                    <div style={{marginTop:6,height:3,background:"rgba(255,255,255,0.1)",borderRadius:2}}>
                      <div style={{height:"100%",width:`${(done/tot)*100}%`,background:`linear-gradient(90deg,${p.c},${p.a})`,borderRadius:2}}/>
                    </div>
                  </button>

              })}
            </div>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:24}}>
          <button onClick={openParent} style={{background:"rgba(123,47,190,0.3)",color:K.pinkL,border:`1px solid ${K.borderP}`,borderRadius:22,padding:"11px 28px",cursor:"pointer",fontSize:14,fontWeight:600}}>
            👨‍👩‍👧 家長儀表板
          </button>
        </div>
      </div>

  // ════════════════════════════════════════════

  // ════════════════════════════════════════════
  if (screen==="grade") {

      <div style={{minHeight:"100vh",background:K.grad,position:"relative",overflow:"hidden",...font}}>
        <SkullBg/>
        <div style={{position:"relative",zIndex:1}}>

                  onMouseEnter={e=>{e.currentTarget.style.transform="translateX(4px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="translateX(0)";}}
                >
                  <div style={{width:42,height:42,borderRadius:"50%",background:done?`linear-gradient(135deg,${pal.c},${pal.a})`:"rgba(168,85,247,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?18:16,flexShrink:0,color:done?"#fff":K.muted,fontWeight:700}}>

                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,color:K.white,fontSize:14}}>Unit {i+1}｜{u.title}</div>
                    <div style={{color:K.muted,fontSize:11,marginTop:2}}>{u.subtitle} · {u.words.length} 個單字</div>
                    <div style={{display:"flex",gap:6,marginTop:6}}>
                      {[{l:"🃏單字卡",ok:p.fc},{l:"💬對話",ok:p.chat},{l:`🎯${p.quiz!==null?p.quiz+"分":"測驗"}`,ok:p.quiz!==null}].map(t=>(
                        <span key={t.l} style={{fontSize:10,background:t.ok?"rgba(168,85,247,0.25)":"rgba(255,255,255,0.06)",color:t.ok?K.purpleL:K.muted,borderRadius:8,padding:"2px 8px",border:t.ok?`1px solid ${K.border}`:"none"}}>{t.l}</span>
                      ))}
                    </div>
                  </div>
                  <span style={{color:pal.c,fontSize:18}}>›</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════
  // UNIT MENU
  // ════════════════════════════════════════════
  if (screen==="unit"&&unit) {
    const p=getP(unit.id);
    return (
      <div style={{minHeight:"100vh",background:K.grad,position:"relative",overflow:"hidden",...font}}>
        <SkullBg/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{background:`linear-gradient(135deg,${pal.c}CC,${pal.a}88)`,padding:"18px 16px 26px",boxShadow:`0 4px 24px ${pal.g}`}}>
            <button onClick={()=>setScreen("grade")} style={backBtn}>← 回年級</button>
            <h2 style={{color:"#fff",margin:"10px 0 0",fontSize:20,fontWeight:900}}>{unit.title}</h2>
            <p style={{color:"rgba(255,255,255,0.8)",margin:"4px 0 0",fontSize:12}}>{unit.subtitle} · {unit.words.length} 個單字</p>
          </div>
          <div style={{padding:18}}>
            {[
              {i:"🃏",l:"單字卡學習",s:"認識本單元所有單字",done:p.fc,fn:startFC,c:K.purple},
              {i:"💬",l:"AI 對話練習",s:"和庫洛米用英文聊天 😈",done:p.chat,fn:startChat,c:K.pink},
              {i:"🎯",l:"小測驗",s:p.quiz!==null?`最高分：${p.quiz}分`:"選擇題 + 拼字題",done:p.quiz!==null,fn:startQuiz,c:K.pinkD},
            ].map(item=>(
              <button key={item.l} onClick={item.fn} style={{width:"100%",background:item.done?`linear-gradient(135deg,${item.c}22,${item.c}11)`:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:item.done?`1.5px solid ${item.c}66`:`1px solid ${K.border}`,borderRadius:20,padding:"18px 20px",marginBottom:14,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:item.done?`0 0 16px ${item.c}44`:"0 3px 14px rgba(0,0,0,0.35)",transition:"all 0.2s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.02)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";}}
              >
                <div style={{width:48,height:48,borderRadius:"50%",background:item.done?`linear-gradient(135deg,${item.c},${item.c}99)`:"rgba(168,85,247,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>
                  {item.i}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,color:K.white,fontSize:15}}>{item.l}</div>
                  <div style={{color:K.muted,fontSize:12,marginTop:3}}>{item.s}</div>
                </div>
                {item.done&&<span style={{color:item.c,fontSize:18}}>✓</span>}
                <span style={{color:pal.c,fontSize:20}}>›</span>
              </button>
            ))}
            {/* word preview */}
            <div style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:20,padding:18}}>
              <div style={{fontWeight:700,color:K.pink,marginBottom:12,fontSize:13}}>📋 本單元單字預覽</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {unit.words.map(w=>(
                  <button key={w.en} onClick={()=>speak(w.en)} style={{background:"rgba(168,85,247,0.15)",border:`1px solid ${K.border}`,borderRadius:10,padding:"6px 12px",cursor:"pointer",fontSize:12,color:K.white,transition:"all 0.15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,107,157,0.25)";e.currentTarget.style.borderColor=K.pink;}}
                    onMouseLeave={e=>{e.currentTarget.style.background="rgba(168,85,247,0.15)";e.currentTarget.style.borderColor=K.border;}}
                  >
                    {w.emoji} {w.en}
                  </button>
                ))}
              </div>
              <p style={{color:K.muted,fontSize:10,marginTop:10,marginBottom:0}}>👆 點單字可以聽發音</p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════
  // FLASHCARD
  // ════════════════════════════════════════════
  if (screen==="fc"&&unit) {
    const words=unit.words, w=words[fcIdx], tot=words.length;
    return (
      <div style={{minHeight:"100vh",background:K.grad,position:"relative",display:"flex",flexDirection:"column",...font}}>
        <SkullBg/>
        <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
          <div style={{background:`linear-gradient(135deg,${pal.c}CC,${pal.a}99)`,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:`0 4px 20px ${pal.g}`}}>
            <button onClick={()=>setScreen("unit")} style={backBtn}>← 返回</button>
            <div style={{flex:1,textAlign:"center"}}>
              <span style={{color:"#fff",fontWeight:800,fontSize:14}}>🃏 單字卡 {fcIdx+1}/{tot}</span>
            </div>
          </div>
          <div style={{height:5,background:"rgba(0,0,0,0.3)"}}>
            <div style={{height:"100%",width:`${((fcIdx+1)/tot)*100}%`,background:`linear-gradient(90deg,${pal.c},${pal.a})`,transition:"width 0.3s"}}/>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
            <div onClick={()=>{setFcFlip(f=>!f);if(!fcFlip)speak(w.en);}} style={{width:"100%",maxWidth:340,minHeight:240,background:fcFlip?"linear-gradient(145deg,#2D1458,#3D1A6E)":"linear-gradient(145deg,#1A0A2E,#2D1458)",borderRadius:28,boxShadow:`0 12px 40px rgba(0,0,0,0.5),0 0 20px ${pal.g}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",padding:32,border:`2px solid ${fcFlip?pal.c:K.border}`,transition:"all 0.3s"}}>
              {/* big emoji */}
              <div style={{fontSize:80,marginBottom:16,lineHeight:1}}>{w.emoji}</div>
              {!fcFlip ? (
                <>
                  <div style={{fontSize:22,fontWeight:800,color:K.white}}>{w.zh}</div>
                  <div style={{color:K.muted,fontSize:12,marginTop:10}}>☠ 點一下看英文 ☠</div>
                </>
              ) : (
                <>
                  <div style={{fontSize:32,fontWeight:900,color:pal.a,textShadow:`0 0 16px ${pal.g}`}}>{w.en}</div>
                  <button onClick={e=>{e.stopPropagation();speak(w.en);}} style={{marginTop:14,background:`linear-gradient(135deg,${pal.c},${pal.a})`,color:"#fff",border:"none",borderRadius:20,padding:"9px 22px",cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:`0 4px 14px ${pal.g}`}}>
                    🔊 聽發音
                  </button>
                </>
              )}
            </div>
            <div style={{display:"flex",gap:12,marginTop:24}}>
              <button disabled={fcIdx===0} onClick={()=>{setFcIdx(i=>i-1);setFcFlip(false);}} style={{background:fcIdx===0?"rgba(255,255,255,0.05)":"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:22,padding:"12px 22px",cursor:fcIdx===0?"default":"pointer",fontSize:14,fontWeight:700,color:fcIdx===0?K.muted:K.white,opacity:fcIdx===0?0.4:1}}>← 上一張</button>
              {fcIdx<tot-1
                ? <button onClick={()=>{setFcIdx(i=>i+1);setFcFlip(false);}} style={{background:`linear-gradient(135deg,${pal.c},${pal.a})`,color:"#fff",border:"none",borderRadius:22,padding:"12px 28px",cursor:"pointer",fontSize:14,fontWeight:700,boxShadow:`0 4px 16px ${pal.g}`}}>下一張 →</button>
                : <button onClick={fcDone} style={{background:K.gradP,color:"#fff",border:"none",borderRadius:22,padding:"12px 24px",cursor:"pointer",fontSize:14,fontWeight:700,boxShadow:K.shadowP}}>✨ 完成！</button>
              }
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════
  // CHAT
  // ════════════════════════════════════════════
  if (screen==="chat"&&unit) return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:K.grad,position:"relative",...font}}>
      <SkullBg/>
      <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{background:`linear-gradient(135deg,${pal.c}CC,${pal.a}99)`,padding:"13px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
          <button onClick={()=>setScreen("unit")} style={backBtn}>← 返回</button>
          <KuromiMood size={36} mood="normal" glow="rgba(255,107,157,0.8)"/>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:14}}>庫洛米英文練習</div>
            <div style={{color:"rgba(255,255,255,0.75)",fontSize:11}}>{unit.title}</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px 12px"}}>
          {chat.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:14}}>
              {m.role==="assistant"&&<div style={{marginRight:8,alignSelf:"flex-end"}}><KuromiMood size={38} mood="normal" glow={pal.g}/></div>}
              <div style={{maxWidth:"75%",background:m.role==="user"?`linear-gradient(135deg,${pal.c},${pal.a})`:"linear-gradient(145deg,#2D1458,#3D1A6E)",color:"#fff",border:m.role==="assistant"?`1px solid ${K.border}`:"none",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"11px 15px",fontSize:14,lineHeight:1.6}}>
                {m.content}
              </div>
              {m.role==="user"&&<div style={{marginLeft:8,alignSelf:"flex-end",fontSize:28}}>😊</div>}
            </div>
          ))}
          {chatLoading&&(
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <KuromiMood size={38} mood="normal" glow={pal.g}/>
              <div style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:"18px 18px 18px 4px",padding:"11px 15px"}}>
                <span style={{color:K.muted}}>庫洛米正在想... 😈💭</span>
              </div>
            </div>
          )}
          <div ref={chatBottom}/>
        </div>
        <div style={{padding:"10px 12px 14px",background:"linear-gradient(145deg,#2D1458,#3D1A6E)",borderTop:`1px solid ${K.border}`,display:"flex",gap:8,flexShrink:0}}>
          <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="用中文或英文回答庫洛米..."
            style={{flex:1,background:"rgba(255,255,255,0.08)",border:`1.5px solid ${K.border}`,borderRadius:22,padding:"10px 16px",fontSize:14,outline:"none",color:K.white}}/>
          <button onClick={sendChat} disabled={chatLoading||!chatIn.trim()} style={{background:chatLoading||!chatIn.trim()?"rgba(168,85,247,0.3)":`linear-gradient(135deg,${pal.c},${pal.a})`,color:"#fff",border:"none",borderRadius:22,padding:"10px 18px",cursor:chatLoading||!chatIn.trim()?"default":"pointer",fontSize:13,fontWeight:700}}>送出</button>
        </div>
      </div>
    </div>
  );

  // ════════════════════════════════════════════
  // QUIZ
  // ════════════════════════════════════════════
  if (screen==="quiz") {
    // ── result screen ──
    if (quizDone) {
      const tot=quizQs.length, pct=Math.round((quizScore/tot)*100);
      const isGreat=pct>=80, isGood=pct>=60;
      return (
        <div style={{minHeight:"100vh",background:K.grad,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",...font}}>
          <SkullBg/>
          <div style={{position:"absolute",top:"30%",left:"50%",transform:"translate(-50%,-50%)",width:200,height:200,borderRadius:"50%",background:`radial-gradient(circle,${isGreat?"rgba(168,85,247,0.3)":"rgba(255,107,157,0.25)"} 0%,transparent 70%)`,pointerEvents:"none"}}/>
          <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
            <KuromiMood size={120} mood={isGreat?"thumbup":isGood?"clap":"sad"} glow={isGreat?"rgba(168,85,247,0.8)":"rgba(255,107,157,0.7)"}/>
            {/* speech bubble */}
            <div style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1.5px solid ${K.borderP}`,borderRadius:16,padding:"10px 20px",display:"inline-block",margin:"12px 0",boxShadow:K.shadowP}}>
              <span style={{color:K.white,fontSize:14,fontWeight:700}}>
                {isGreat?"哇！你真的太強了！⭐":"" }
                {isGood&&!isGreat?"很不錯喔！繼續加油！😈":""}
                {!isGood?"沒關係，再試一次！💜":""}
              </span>
            </div>
            <div style={{fontSize:60,fontWeight:900,background:K.gradP,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.1}}>{pct}分</div>
            <p style={{color:K.muted,fontSize:13,margin:"6px 0 24px"}}>答對 {quizScore}/{tot} 題</p>
            <div style={{display:"flex",gap:12,justifyContent:"center"}}>
              <button onClick={startQuiz} style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",color:K.pink,border:`1.5px solid ${K.borderP}`,borderRadius:24,padding:"12px 24px",cursor:"pointer",fontWeight:700,fontSize:14}}>再做一次</button>
              <button onClick={()=>setScreen("unit")} style={{background:K.gradP,color:"#fff",border:"none",borderRadius:24,padding:"12px 24px",cursor:"pointer",fontWeight:700,fontSize:14,boxShadow:K.shadowP}}>回單元</button>
            </div>
          </div>
        </div>
      );
    }

    const q=quizQs[quizIdx];
    if (!q) return null;

    return (
      <div style={{minHeight:"100vh",background:K.grad,position:"relative",...font}}>
        <SkullBg/>
        <div style={{position:"relative",zIndex:1}}>
          {/* header */}
          <div style={{background:`linear-gradient(135deg,${pal.c}CC,${pal.a}99)`,padding:"14px 16px"}}>
            <div style={{color:"#fff",fontWeight:800,fontSize:14,textAlign:"center"}}>
              🎯 測驗 {quizIdx+1}/{quizQs.length} {q.type==="spell"?"— 拼字題✍️":"— 選擇題"}
            </div>
          </div>
          <div style={{height:5,background:"rgba(0,0,0,0.3)"}}>
            <div style={{height:"100%",width:`${(quizIdx/quizQs.length)*100}%`,background:`linear-gradient(90deg,${pal.c},${pal.a})`}}/>
          </div>

          <div style={{padding:18}}>
            {/* Kuromi + question */}
            <div style={{display:"flex",alignItems:"center",gap:16,background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:22,padding:"18px 20px",marginBottom:18}}>
              <KuromiMood size={64} mood={quizAns==="correct"||spellResult===true?"thumbup":quizAns==="wrong"||spellResult===false?"sad":"normal"} glow={pal.g}/>
              <div>
                <div style={{fontSize:48,lineHeight:1}}>{q.emoji}</div>
                <div style={{fontSize:16,color:K.white,fontWeight:700,marginTop:6}}>{q.question.replace(q.emoji,"").trim()}</div>
                {quizAns==="correct"&&<div style={{color:"#A855F7",fontSize:13,marginTop:4,fontWeight:700}}>✓ 答對了！太棒！⭐</div>}
                {quizAns==="wrong"&&<div style={{color:K.pink,fontSize:13,marginTop:4,fontWeight:700}}>✗ 正確答案：{q.answer}</div>}
                {spellResult===true&&<div style={{color:"#A855F7",fontSize:13,marginTop:4,fontWeight:700}}>✓ 拼對了！超厲害！⭐</div>}
                {spellResult===false&&<div style={{color:K.pink,fontSize:13,marginTop:4,fontWeight:700}}>✗ 正確拼法：{q.answer}</div>}
              </div>
            </div>

            {/* CHOICE */}
            {q.type==="choice"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {q.options.map(opt=>{
                  let bg="linear-gradient(145deg,#2D1458,#3D1A6E)",border=K.border,color=K.white,shadow="none";
                  if(quizAns!==null){
                    if(opt===q.answer){bg="linear-gradient(135deg,rgba(168,85,247,0.4),rgba(168,85,247,0.2))";border=`1.5px solid ${K.purpleL}`;color=K.purpleL;shadow=`0 0 14px rgba(168,85,247,0.5)`;}
                    else if(opt===quizAns.replace("correct","").replace("wrong","")&&quizAns==="wrong"){bg="linear-gradient(135deg,rgba(255,107,157,0.25),rgba(255,107,157,0.1))";border=`1.5px solid ${K.pink}`;color=K.pink;}
                  }
                  return (
                    <button key={opt} onClick={()=>handleChoice(opt)} style={{background:bg,border,color,borderRadius:18,padding:"16px 12px",cursor:quizAns!==null?"default":"pointer",fontWeight:700,fontSize:14,transition:"all 0.2s",boxShadow:shadow}}
                      onMouseEnter={e=>{if(quizAns===null){e.currentTarget.style.border=`1.5px solid ${pal.c}`;e.currentTarget.style.boxShadow=`0 0 12px ${pal.g}`;e.currentTarget.style.transform="scale(1.03)";}}}
                      onMouseLeave={e=>{if(quizAns===null){e.currentTarget.style.border=K.border;e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="scale(1)";}}}
                    >{opt}</button>
                  );
                })}
              </div>
            )}

            {/* SPELL */}
            {q.type==="spell"&&(
              <div>
                <p style={{color:K.muted,fontSize:13,textAlign:"center",marginBottom:12}}>請拼出這個單字的英文字母 ✍️</p>
                {/* letter hint dots */}
                <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:16}}>
                  {q.answer.split("").map((_,i)=>(
                    <div key={i} style={{width:32,height:4,borderRadius:2,background:spellInput.length>i?"linear-gradient(90deg,"+pal.c+","+pal.a+")":"rgba(255,255,255,0.15)"}}/>
                  ))}
                </div>
                <input
                  autoFocus
                  value={spellInput}
                  onChange={e=>setSpellResult===null&&setSpellInput(e.target.value.replace(/[^a-zA-Z\s]/g,""))}
                  onKeyDown={e=>e.key==="Enter"&&spellInput.trim()&&handleSpell()}
                  placeholder={`輸入 ${q.answer.length} 個英文字母...`}
                  disabled={spellResult!==null}
                  style={{
                    width:"100%",boxSizing:"border-box",
                    background:spellResult===true?"rgba(168,85,247,0.2)":spellResult===false?"rgba(255,107,157,0.15)":"rgba(255,255,255,0.08)",
                    border:`2px solid ${spellResult===true?K.purpleL:spellResult===false?K.pink:K.border}`,
                    borderRadius:16,padding:"14px 18px",fontSize:20,textAlign:"center",
                    outline:"none",color:K.white,letterSpacing:4,fontWeight:700,
                    transition:"all 0.2s",
                  }}
                />
                {/* alphabet hint buttons */}
                <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginTop:14}}>
                  {"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l=>(
                    <button key={l} onClick={()=>{if(spellResult===null)setSpellInput(p=>(p+l).slice(0,q.answer.length+4));}}
                      style={{width:36,height:36,background:"rgba(168,85,247,0.18)",border:`1px solid ${K.border}`,borderRadius:8,color:K.white,fontSize:13,fontWeight:700,cursor:"pointer",transition:"all 0.15s"}}
                      onMouseEnter={e=>{e.currentTarget.style.background=`rgba(168,85,247,0.4)`;e.currentTarget.style.borderColor=pal.c;}}
                      onMouseLeave={e=>{e.currentTarget.style.background="rgba(168,85,247,0.18)";e.currentTarget.style.borderColor=K.border;}}
                    >{l}</button>
                  ))}
                </div>
                <div style={{display:"flex",gap:10,marginTop:16}}>
                  <button onClick={()=>setSpellInput(p=>p.slice(0,-1))} style={{flex:1,background:"rgba(255,255,255,0.08)",border:`1px solid ${K.border}`,borderRadius:14,padding:"12px",color:K.muted,fontSize:14,cursor:"pointer",fontWeight:600}}>⌫ 刪除</button>
                  <button onClick={()=>setSpellInput("")} style={{flex:1,background:"rgba(255,255,255,0.08)",border:`1px solid ${K.border}`,borderRadius:14,padding:"12px",color:K.muted,fontSize:14,cursor:"pointer",fontWeight:600}}>✗ 清除</button>
                  <button onClick={handleSpell} disabled={!spellInput.trim()||spellResult!==null} style={{flex:2,background:!spellInput.trim()||spellResult!==null?"rgba(168,85,247,0.3)":`linear-gradient(135deg,${pal.c},${pal.a})`,border:"none",borderRadius:14,padding:"12px",color:"#fff",fontSize:14,cursor:!spellInput.trim()||spellResult!==null?"default":"pointer",fontWeight:800}}>✓ 確認答案</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════
  // PIN
  // ════════════════════════════════════════════
  if (screen==="pin") return (
    <div style={{minHeight:"100vh",background:K.grad,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",...font}}>
      <SkullBg/>
      <div style={{position:"relative",zIndex:1,background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:28,padding:32,width:"100%",maxWidth:320,textAlign:"center",boxShadow:K.shadow}}>
        <KuromiMood size={80} mood="normal" glow={K.pink}/>
        <h2 style={{margin:"12px 0 6px",color:K.white,fontWeight:900}}>家長模式</h2>
        <p style={{color:K.muted,fontSize:13,margin:"0 0 22px"}}>請輸入4位數密碼</p>
        <input type="password" maxLength={4} value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&submitPin()}
          placeholder="• • • •"
          style={{width:"100%",background:"rgba(255,255,255,0.08)",border:pinErr?`2px solid ${K.pink}`:`1.5px solid ${K.border}`,borderRadius:16,padding:"14px",fontSize:24,textAlign:"center",outline:"none",boxSizing:"border-box",letterSpacing:10,color:K.white}}/>
        {pinErr&&<p style={{color:K.pink,fontSize:12,margin:"8px 0 0"}}>密碼錯誤，請再試一次 😈</p>}
        <p style={{color:K.muted,fontSize:11,margin:"8px 0 20px"}}>預設密碼：1234</p>
        <div style={{display:"flex",gap:10}}>
          <button onClick={goHome} style={{flex:1,background:"rgba(255,255,255,0.07)",color:K.muted,border:`1px solid ${K.border}`,borderRadius:16,padding:"12px",cursor:"pointer",fontSize:14}}>取消</button>
          <button onClick={submitPin} style={{flex:1,background:K.gradPu,color:"#fff",border:"none",borderRadius:16,padding:"12px",cursor:"pointer",fontSize:14,fontWeight:700}}>進入</button>
        </div>
      </div>
    </div>
  );

  // ════════════════════════════════════════════
  // PARENT
  // ════════════════════════════════════════════
  if (screen==="parent") {
    const allUnits=Object.entries(CURRICULUM).flatMap(([g,gr])=>gr.units.map(u=>({...u,grade:parseInt(g),gl:gr.label,gc:gr.color})));
    const scoreEntries=Object.entries(data.scores||{}).flatMap(([uid,arr])=>{const u=allUnits.find(u=>u.id===uid);return arr.map(s=>({unit:u?.title||uid,score:s.score,date:s.date}));});
    const weakUnits=allUnits.filter(u=>{const p=getP(u.id);return p.quiz!==null&&p.quiz<70;});
    return (
      <div style={{minHeight:"100vh",background:K.grad,position:"relative",...font}}>
        <SkullBg/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{background:"linear-gradient(135deg,#2D0A4E,#4A1080)",padding:"18px 16px 22px",borderBottom:`1px solid ${K.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={goHome} style={backBtn}>← 返回</button>
              <h2 style={{color:K.white,margin:0,fontSize:18,fontWeight:900}}>😈 家長儀表板</h2>
            </div>
          </div>
          {/* tabs */}
          <div style={{display:"flex",background:"linear-gradient(145deg,#2D1458,#3D1A6E)",borderBottom:`1px solid ${K.border}`}}>
            {[["overview","📊 總覽"],["progress","📚 進度"],["scores","🎯 成績"],["settings","⚙️ 設定"]].map(([t,l])=>(
              <button key={t} onClick={()=>setParentTab(t)} style={{flex:1,padding:"12px 4px",border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"transparent",color:parentTab===t?K.pink:K.muted,borderBottom:parentTab===t?`3px solid ${K.pink}`:"3px solid transparent",transition:"color 0.2s"}}>{l}</button>
            ))}
          </div>
          <div style={{padding:14}}>
            {/* OVERVIEW */}
            {parentTab==="overview"&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  {[{i:"💜",l:"累積星星",v:data.stars,c:K.purpleL},{i:"🔥",l:"學習連勝",v:`${data.streak} 天`,c:K.pink},{i:"☠️",l:"完成單元",v:`${allUnits.filter(u=>isComplete(u.id)).length}/${allUnits.length}`,c:K.pinkL},{i:"📅",l:"最後學習",v:data.lastDate?new Date(data.lastDate).toLocaleDateString("zh-TW"):"—",c:K.purpleL}].map(s=>(
                    <div key={s.l} style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:16,padding:14,textAlign:"center"}}>
                      <div style={{fontSize:26}}>{s.i}</div>
                      <div style={{fontSize:20,fontWeight:900,color:s.c,marginTop:4}}>{s.v}</div>
                      <div style={{color:K.muted,fontSize:11,marginTop:2}}>{s.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:18,padding:16,marginBottom:14}}>
                  <div style={{fontWeight:800,color:K.pink,marginBottom:14,fontSize:14}}>各年級完成率</div>
                  {[1,2,3,4,5,6].map(g=>{
                    const gr=CURRICULUM[g],p=GP[g],done=gradeComplete(g),tot=gr.units.length;
                    return (
                      <div key={g} style={{marginBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                          <span style={{fontSize:12,color:K.white}}>{gr.emoji} {gr.label}</span>
                          <span style={{fontSize:12,fontWeight:700,color:p.c}}>{done}/{tot} 單元</span>
                        </div>
                        <div style={{height:7,background:"rgba(255,255,255,0.08)",borderRadius:4}}>
                          <div style={{height:"100%",width:`${(done/tot)*100}%`,background:`linear-gradient(90deg,${p.c},${p.a})`,borderRadius:4,boxShadow:`0 0 6px ${p.g}`,transition:"width 0.5s"}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {weakUnits.length>0&&(
                  <div style={{background:"rgba(255,107,157,0.1)",borderRadius:16,padding:14,border:`1px solid ${K.borderP}`}}>
                    <div style={{fontWeight:800,color:K.pink,marginBottom:10,fontSize:13}}>⚠️ 需要加強的單元</div>
                    {weakUnits.map(u=>{const p=getP(u.id);return(
                      <div key={u.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid rgba(255,107,157,0.2)`}}>
                        <span style={{fontSize:12,color:K.white}}>{u.gl} · {u.title}</span>
                        <span style={{fontSize:12,fontWeight:700,color:K.pink}}>{p.quiz}分</span>
                      </div>
                    );})}
                  </div>
                )}
              </div>
            )}
            {/* PROGRESS */}
            {parentTab==="progress"&&[1,2,3,4,5,6].map(g=>{
              const gr=CURRICULUM[g],p=GP[g];
              return(
                <div key={g} style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:18,marginBottom:12,overflow:"hidden"}}>
                  <div style={{background:`linear-gradient(135deg,${p.c}BB,${p.a}88)`,padding:"11px 14px",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:18}}>{gr.emoji}</span>
                    <span style={{color:"#fff",fontWeight:800,fontSize:14}}>{gr.label}</span>
                    <span style={{color:"rgba(255,255,255,0.75)",fontSize:11,marginLeft:"auto"}}>{gradeComplete(g)}/{gr.units.length} 完成</span>
                  </div>
                  {gr.units.map(u=>{const pp=getP(u.id),done=isComplete(u.id);return(
                    <div key={u.id} style={{padding:"11px 14px",borderBottom:`1px solid rgba(168,85,247,0.1)`,display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:14,color:done?K.purpleL:K.muted}}>{done?"✓":"○"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:600,color:K.white}}>{u.title}</div>
                        <div style={{display:"flex",gap:5,marginTop:4}}>
                          {[{l:"🃏單字卡",ok:pp.fc},{l:"💬對話",ok:pp.chat},{l:`🎯${pp.quiz!==null?pp.quiz+"分":"未測"}`,ok:pp.quiz!==null}].map(t=>(
                            <span key={t.l} style={{fontSize:9,background:t.ok?"rgba(168,85,247,0.25)":"rgba(255,255,255,0.05)",color:t.ok?K.purpleL:K.muted,borderRadius:6,padding:"2px 6px"}}>{t.l}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                  );})}
                </div>
              );
            })}
            {/* SCORES */}
            {parentTab==="scores"&&(scoreEntries.length===0
              ?<div style={{textAlign:"center",padding:"60px 20px",color:K.muted}}><div style={{fontSize:48}}>📊</div><p style={{marginTop:16}}>還沒有測驗成績</p></div>
              :scoreEntries.map((e,i)=>(
                <div key={i} style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:14,padding:"13px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:42,height:42,borderRadius:"50%",background:e.score>=80?"rgba(168,85,247,0.25)":"rgba(255,107,157,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                    {e.score>=80?"🏆":e.score>=60?"💜":"💪"}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,color:K.white,fontSize:13}}>{e.unit}</div>
                    <div style={{color:K.muted,fontSize:11,marginTop:2}}>{e.date}</div>
                  </div>
                  <div style={{fontSize:20,fontWeight:900,color:e.score>=80?K.purpleL:e.score>=60?K.pink:K.pinkD}}>{e.score}分</div>
                </div>
              ))
            )}
            {/* SETTINGS */}
            {parentTab==="settings"&&(
              <div>
                <div style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:18,padding:18,marginBottom:14}}>
                  <div style={{fontWeight:800,color:K.pink,marginBottom:14,fontSize:14}}>🔒 修改密碼</div>
                  <p style={{color:K.muted,fontSize:12,margin:"0 0 10px"}}>目前密碼：{data.pin}</p>
                  <input placeholder="新密碼（4位數字）" maxLength={4} id="newPin"
                    style={{width:"100%",background:"rgba(255,255,255,0.08)",border:`1.5px solid ${K.border}`,borderRadius:12,padding:"10px 14px",fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:10,color:K.white}}/>
                  <button onClick={()=>{const np=document.getElementById("newPin").value;if(/^\d{4}$/.test(np)){persist(d=>({...d,pin:np}));alert("密碼已更新！");document.getElementById("newPin").value="";}else{alert("請輸入4位數字密碼");}}}
                    style={{background:K.gradPu,color:"#fff",border:"none",borderRadius:12,padding:"10px 22px",cursor:"pointer",fontWeight:700,fontSize:13}}>確認修改</button>
                </div>
                <div style={{background:"linear-gradient(145deg,#2D1458,#3D1A6E)",border:`1px solid ${K.border}`,borderRadius:18,padding:18}}>
                  <div style={{fontWeight:800,color:K.pink,marginBottom:10,fontSize:14}}>🗑️ 重置資料</div>
                  <p style={{color:K.muted,fontSize:12,margin:"0 0 14px"}}>清除所有學習記錄（不可恢復）</p>
                  <button onClick={()=>{if(window.confirm("確定要清除所有資料嗎？")){const f=defaultData();saveData(f);setData(f);alert("資料已重置！");}}}
                    style={{background:"rgba(255,107,157,0.15)",color:K.pink,border:`1.5px solid ${K.borderP}`,borderRadius:12,padding:"10px 22px",cursor:"pointer",fontWeight:700,fontSize:13}}>清除所有資料</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>


</body></html>
